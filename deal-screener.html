<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Deal Screener — Real Estate Analyzer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0a;
    --surface: #141414;
    --surface2: #1c1c1c;
    --border: rgba(255,255,255,0.08);
    --border-strong: rgba(255,255,255,0.15);
    --text: #f0ede8;
    --muted: #6b6b6b;
    --accent: #b8ff57;
    --accent-dim: rgba(184,255,87,0.12);
    --accent-text: #0a0a0a;
    --warn: #ffb547;
    --warn-dim: rgba(255,181,71,0.12);
    --danger: #ff6b6b;
    --danger-dim: rgba(255,107,107,0.12);
    --font-head: 'Syne', sans-serif;
    --font-mono: 'DM Mono', monospace;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html { background: var(--bg); }
  body {
    font-family: var(--font-head);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    max-width: 480px;
    margin: 0 auto;
    padding: 0 0 80px;
  }

  /* Header */
  .header {
    padding: 28px 20px 20px;
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    background: var(--bg);
    z-index: 10;
  }
  .header-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 16px;
  }
  .logo {
    font-size: 13px;
    font-weight: 700;
    letter-spacing: .12em;
    text-transform: uppercase;
    color: var(--accent);
  }
  .badge {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: .08em;
    text-transform: uppercase;
    color: var(--muted);
    border: 1px solid var(--border);
    padding: 3px 8px;
    border-radius: 20px;
  }

  /* Mode tabs */
  .tabs {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }
  .tab {
    padding: 10px 0;
    border: 1px solid var(--border);
    border-radius: 8px;
    background: transparent;
    color: var(--muted);
    font-family: var(--font-head);
    font-size: 13px;
    font-weight: 600;
    letter-spacing: .04em;
    cursor: pointer;
    transition: all .2s;
    text-align: center;
  }
  .tab.active {
    background: var(--accent);
    border-color: var(--accent);
    color: var(--accent-text);
  }

  /* Content */
  .content { padding: 20px; }

  /* Section label */
  .section-label {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: .14em;
    text-transform: uppercase;
    color: var(--muted);
    margin: 24px 0 10px;
  }
  .section-label:first-child { margin-top: 0; }

  /* Fields */
  .field { margin-bottom: 12px; }
  .field label {
    display: block;
    font-size: 12px;
    font-weight: 600;
    color: var(--muted);
    letter-spacing: .04em;
    margin-bottom: 6px;
  }
  .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .input-wrap { position: relative; }
  .input-prefix {
    position: absolute;
    left: 12px;
    top: 50%;
    transform: translateY(-50%);
    font-family: var(--font-mono);
    font-size: 14px;
    color: var(--muted);
    pointer-events: none;
  }
  .input-suffix {
    position: absolute;
    right: 12px;
    top: 50%;
    transform: translateY(-50%);
    font-family: var(--font-mono);
    font-size: 13px;
    color: var(--muted);
    pointer-events: none;
  }
  input[type=number] {
    width: 100%;
    height: 48px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: var(--font-mono);
    font-size: 15px;
    font-weight: 500;
    padding: 0 14px 0 26px;
    outline: none;
    transition: border-color .15s;
    appearance: textfield;
    -moz-appearance: textfield;
  }
  input[type=number]::-webkit-outer-spin-button,
  input[type=number]::-webkit-inner-spin-button { -webkit-appearance: none; }
  input[type=number]:focus { border-color: var(--accent); }
  input[type=number].no-prefix { padding-left: 14px; }
  input[type=number].has-suffix { padding-right: 32px; }

  /* Analyze button */
  .btn-analyze {
    width: 100%;
    height: 56px;
    background: var(--accent);
    border: none;
    border-radius: 10px;
    color: var(--accent-text);
    font-family: var(--font-head);
    font-size: 15px;
    font-weight: 800;
    letter-spacing: .05em;
    text-transform: uppercase;
    cursor: pointer;
    margin-top: 24px;
    transition: opacity .15s, transform .1s;
    position: relative;
    overflow: hidden;
  }
  .btn-analyze:active { transform: scale(0.98); opacity: .9; }

  /* Results */
  .results { margin-top: 28px; display: none; }

  /* Verdict card */
  .verdict {
    border-radius: 12px;
    padding: 20px;
    margin-bottom: 16px;
    border: 1px solid;
    position: relative;
    overflow: hidden;
  }
  .verdict::before {
    content: '';
    position: absolute;
    top: -40px;
    right: -40px;
    width: 120px;
    height: 120px;
    border-radius: 50%;
    opacity: .08;
  }
  .verdict.hot { background: var(--accent-dim); border-color: var(--accent); }
  .verdict.hot::before { background: var(--accent); }
  .verdict.warm { background: var(--warn-dim); border-color: var(--warn); }
  .verdict.warm::before { background: var(--warn); }
  .verdict.pass { background: var(--danger-dim); border-color: var(--danger); }
  .verdict.pass::before { background: var(--danger); }
  .verdict-tag {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: .12em;
    text-transform: uppercase;
    margin-bottom: 6px;
  }
  .verdict.hot .verdict-tag { color: var(--accent); }
  .verdict.warm .verdict-tag { color: var(--warn); }
  .verdict.pass .verdict-tag { color: var(--danger); }
  .verdict-label {
    font-size: 28px;
    font-weight: 800;
    line-height: 1;
    margin-bottom: 8px;
  }
  .verdict-sub { font-size: 13px; color: var(--muted); line-height: 1.5; }

  /* Metric cards */
  .metrics {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin-bottom: 16px;
  }
  .metric {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px;
  }
  .metric .mlabel {
    font-size: 11px;
    font-weight: 600;
    color: var(--muted);
    letter-spacing: .04em;
    margin-bottom: 6px;
    text-transform: uppercase;
  }
  .metric .mval {
    font-family: var(--font-mono);
    font-size: 22px;
    font-weight: 500;
  }
  .mval.good { color: var(--accent); }
  .mval.warn { color: var(--warn); }
  .mval.bad { color: var(--danger); }
  .mval.neutral { color: var(--text); }

  /* Breakdown */
  .breakdown {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px;
    margin-bottom: 16px;
  }
  .breakdown-title {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: .1em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 14px;
  }
  .brow {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 8px 0;
    border-bottom: 1px solid var(--border);
    font-size: 13px;
  }
  .brow:last-child { border-bottom: none; padding-bottom: 0; }
  .brow .blabel { color: var(--muted); }
  .brow .bval { font-family: var(--font-mono); font-weight: 500; color: var(--text); }
  .brow.total { margin-top: 4px; }
  .brow.total .blabel { color: var(--text); font-weight: 600; font-size: 14px; }
  .brow.total .bval { font-size: 17px; }

  /* Reset */
  .btn-reset {
    width: 100%;
    height: 48px;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--muted);
    font-family: var(--font-head);
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    letter-spacing: .04em;
    transition: border-color .15s, color .15s;
  }
  .btn-reset:hover { border-color: var(--border-strong); color: var(--text); }

  /* Footer */
  .footer {
    text-align: center;
    padding: 20px;
    font-size: 11px;
    color: var(--muted);
    letter-spacing: .04em;
  }

  /* Pulse animation on analyze */
  @keyframes pulse {
    0% { transform: scale(1); }
    50% { transform: scale(1.01); }
    100% { transform: scale(1); }
  }
  .results.show { display: block; animation: pulse .3s ease; }

  /* Divider */
  .divider { height: 1px; background: var(--border); margin: 4px 0 16px; }
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <div class="logo">Deal Screener</div>
    <div class="badge">Real Estate Analyzer</div>
  </div>
  <div class="tabs">
    <button class="tab active" onclick="setMode('flip', this)">Fix &amp; Flip</button>
    <button class="tab" onclick="setMode('vrental', this)">Vacation Rental</button>
  </div>
</div>

<div class="content">

  <!-- FIX & FLIP FORM -->
  <div id="flip-form">
    <div class="section-label">Property Info</div>

    <div class="field-row">
      <div class="field">
        <label>Asking Price</label>
        <div class="input-wrap">
          <span class="input-prefix">$</span>
          <input type="number" id="f-ask" placeholder="185,000">
        </div>
      </div>
      <div class="field">
        <label>After Repair Value</label>
        <div class="input-wrap">
          <span class="input-prefix">$</span>
          <input type="number" id="f-arv" placeholder="340,000">
        </div>
      </div>
    </div>

    <div class="field-row">
      <div class="field">
        <label>Repair Costs</label>
        <div class="input-wrap">
          <span class="input-prefix">$</span>
          <input type="number" id="f-rep" placeholder="60,000">
        </div>
      </div>
      <div class="field">
        <label>Hold Period</label>
        <div class="input-wrap">
          <input type="number" id="f-hold" class="no-prefix has-suffix" value="6" placeholder="6">
          <span class="input-suffix">mo</span>
        </div>
      </div>
    </div>

    <div class="section-label">Cost Assumptions</div>

    <div class="field-row">
      <div class="field">
        <label>Buy Closing Costs</label>
        <div class="input-wrap">
          <input type="number" id="f-cc1" class="no-prefix has-suffix" value="2" placeholder="2">
          <span class="input-suffix">%</span>
        </div>
      </div>
      <div class="field">
        <label>Sell Closing Costs</label>
        <div class="input-wrap">
          <input type="number" id="f-cc2" class="no-prefix has-suffix" value="8" placeholder="8">
          <span class="input-suffix">%</span>
        </div>
      </div>
    </div>

    <div class="field-row">
      <div class="field">
        <label>Carrying Costs/Mo</label>
        <div class="input-wrap">
          <span class="input-prefix">$</span>
          <input type="number" id="f-carry" value="1200" placeholder="1,200">
        </div>
      </div>
      <div class="field">
        <label>Min Profit Target</label>
        <div class="input-wrap">
          <span class="input-prefix">$</span>
          <input type="number" id="f-target" value="30000" placeholder="30,000">
        </div>
      </div>
    </div>
  </div>

  <!-- VACATION RENTAL FORM -->
  <div id="vrental-form" style="display:none">
    <div class="section-label">Property Info</div>

    <div class="field-row">
      <div class="field">
        <label>Purchase Price</label>
        <div class="input-wrap">
          <span class="input-prefix">$</span>
          <input type="number" id="v-price" placeholder="420,000">
        </div>
      </div>
      <div class="field">
        <label>Down Payment</label>
        <div class="input-wrap">
          <input type="number" id="v-down" class="no-prefix has-suffix" value="20" placeholder="20">
          <span class="input-suffix">%</span>
        </div>
      </div>
    </div>

    <div class="field-row">
      <div class="field">
        <label>Gross Annual Rent</label>
        <div class="input-wrap">
          <span class="input-prefix">$</span>
          <input type="number" id="v-rent" placeholder="55,000">
        </div>
      </div>
      <div class="field">
        <label>Occupancy Rate</label>
        <div class="input-wrap">
          <input type="number" id="v-occ" class="no-prefix has-suffix" value="65" placeholder="65">
          <span class="input-suffix">%</span>
        </div>
      </div>
    </div>

    <div class="section-label">Annual Expenses</div>

    <div class="field-row">
      <div class="field">
        <label>Property Mgmt</label>
        <div class="input-wrap">
          <input type="number" id="v-mgmt" class="no-prefix has-suffix" value="25" placeholder="25">
          <span class="input-suffix">%</span>
        </div>
      </div>
      <div class="field">
        <label>Taxes + Insurance</label>
        <div class="input-wrap">
          <span class="input-prefix">$</span>
          <input type="number" id="v-tax" value="6000" placeholder="6,000">
        </div>
      </div>
    </div>

    <div class="field-row">
      <div class="field">
        <label>Maintenance/Yr</label>
        <div class="input-wrap">
          <span class="input-prefix">$</span>
          <input type="number" id="v-maint" value="3000" placeholder="3,000">
        </div>
      </div>
      <div class="field">
        <label>Min Cash-on-Cash</label>
        <div class="input-wrap">
          <input type="number" id="v-target" class="no-prefix has-suffix" value="8" placeholder="8">
          <span class="input-suffix">%</span>
        </div>
      </div>
    </div>
  </div>

  <button class="btn-analyze" onclick="analyze()">Analyze Deal</button>

  <!-- RESULTS -->
  <div class="results" id="results">

    <div class="verdict" id="verdict-box">
      <div class="verdict-tag" id="verdict-tag"></div>
      <div class="verdict-label" id="verdict-label"></div>
      <div class="verdict-sub" id="verdict-sub"></div>
    </div>

    <div class="metrics" id="metrics-grid"></div>

    <div class="breakdown">
      <div class="breakdown-title">Full Breakdown</div>
      <div id="breakdown-rows"></div>
    </div>

    <button class="btn-reset" onclick="reset()">Clear &amp; Start New Deal</button>
  </div>

</div>

<div class="footer">Built for real estate investors &nbsp;·&nbsp; No data stored</div>

<script>
let mode = 'flip';

function setMode(m, el) {
  mode = m;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('flip-form').style.display = m === 'flip' ? 'block' : 'none';
  document.getElementById('vrental-form').style.display = m === 'vrental' ? 'block' : 'none';
  reset();
}

function reset() {
  const r = document.getElementById('results');
  r.classList.remove('show');
  r.style.display = 'none';
}

function fmt(n) {
  return '$' + Math.round(n).toLocaleString();
}

function pct(n) {
  return (Math.round(n * 10) / 10) + '%';
}

function colorClass(val, good, ok) {
  return val >= good ? 'good' : val >= ok ? 'warn' : 'bad';
}

function showResults(verdict, vsub, cls, metrics, rows) {
  const vbox = document.getElementById('verdict-box');
  vbox.className = 'verdict ' + cls;
  document.getElementById('verdict-tag').textContent = cls === 'hot' ? 'Strong Signal' : cls === 'warm' ? 'Needs Negotiation' : 'Not a Deal';
  document.getElementById('verdict-label').textContent = verdict;
  document.getElementById('verdict-sub').textContent = vsub;

  const mg = document.getElementById('metrics-grid');
  mg.innerHTML = metrics.map(m =>
    `<div class="metric"><div class="mlabel">${m.label}</div><div class="mval ${m.cls}">${m.val}</div></div>`
  ).join('');

  const br = document.getElementById('breakdown-rows');
  br.innerHTML = rows.map((r, i) =>
    `<div class="brow ${r.total ? 'total' : ''}"><span class="blabel">${r.label}</span><span class="bval" style="${r.color ? 'color:' + r.color : ''}">${r.val}</span></div>`
  ).join('');

  const res = document.getElementById('results');
  res.style.display = 'block';
  setTimeout(() => res.classList.add('show'), 10);
  res.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function analyze() {
  if (mode === 'flip') analyzeFlip();
  else analyzeVR();
}

function analyzeFlip() {
  const ask    = +document.getElementById('f-ask').value || 0;
  const arv    = +document.getElementById('f-arv').value || 0;
  const rep    = +document.getElementById('f-rep').value || 0;
  const hold   = +document.getElementById('f-hold').value || 6;
  const cc1    = (+document.getElementById('f-cc1').value || 2) / 100;
  const cc2    = (+document.getElementById('f-cc2').value || 8) / 100;
  const carry  = +document.getElementById('f-carry').value || 1200;
  const target = +document.getElementById('f-target').value || 30000;

  if (!ask || !arv) { alert('Please enter at least Asking Price and ARV.'); return; }

  const buyCost  = ask * cc1;
  const sellCost = arv * cc2;
  const holdCost = carry * hold;
  const totalIn  = ask + rep + buyCost + holdCost;
  const profit   = arv - totalIn - sellCost;
  const roi      = (profit / totalIn) * 100;
  const maxOffer = arv * 0.70 - rep;
  const equity   = arv - ask - rep;

  let verdict, vsub, cls;
  if (profit >= target && roi >= 20) {
    verdict = 'Hot Deal'; cls = 'hot';
    vsub = 'Meets your profit target and ROI. Move quickly — deals like this don\'t last.';
  } else if (profit >= target * 0.75 && roi >= 12) {
    verdict = 'Negotiate Hard'; cls = 'warm';
    vsub = 'You\'re close. Push the seller on price or renegotiate repair scope to hit your number.';
  } else {
    verdict = 'Pass on This One'; cls = 'pass';
    vsub = 'The numbers don\'t work at asking price. Walk away or counter at max offer below.';
  }

  showResults(verdict, vsub, cls,
    [
      { label: 'Net Profit',       val: fmt(profit),   cls: colorClass(profit, target, target * 0.75) },
      { label: 'ROI',              val: pct(roi),       cls: colorClass(roi, 20, 12) },
      { label: 'Max Offer (70%)',  val: fmt(maxOffer),  cls: 'neutral' },
      { label: 'Equity Spread',    val: fmt(equity),    cls: colorClass(equity, 80000, 40000) },
    ],
    [
      { label: 'Purchase price',                      val: fmt(ask) },
      { label: 'Repair costs',                        val: fmt(rep) },
      { label: `Buy closing (${Math.round(cc1*100)}%)`, val: fmt(buyCost) },
      { label: `Carrying costs (${hold} mo)`,         val: fmt(holdCost) },
      { label: `Sell closing (${Math.round(cc2*100)}%)`, val: fmt(sellCost) },
      { label: 'Total all-in cost',                   val: fmt(totalIn + sellCost) },
      { label: 'Net profit',                          val: fmt(profit), total: true, color: profit >= 0 ? '#b8ff57' : '#ff6b6b' },
    ]
  );
}

function analyzeVR() {
  const price  = +document.getElementById('v-price').value || 0;
  const down   = (+document.getElementById('v-down').value || 20) / 100;
  const rent   = +document.getElementById('v-rent').value || 0;
  const occ    = (+document.getElementById('v-occ').value || 65) / 100;
  const mgmt   = (+document.getElementById('v-mgmt').value || 25) / 100;
  const tax    = +document.getElementById('v-tax').value || 0;
  const maint  = +document.getElementById('v-maint').value || 0;
  const tgtCoc = +document.getElementById('v-target').value || 8;

  if (!price || !rent) { alert('Please enter Purchase Price and Gross Annual Rent.'); return; }

  const effRent   = rent * occ;
  const mgmtCost  = effRent * mgmt;
  const totalExp  = mgmtCost + tax + maint;
  const noi       = effRent - totalExp;
  const capRate   = (noi / price) * 100;
  const downAmt   = price * down;
  const loan      = price - downAmt;
  const rate      = 0.07 / 12;
  const n         = 360;
  const mo        = loan * rate * Math.pow(1 + rate, n) / (Math.pow(1 + rate, n) - 1);
  const debt      = mo * 12;
  const cashflow  = noi - debt;
  const coc       = (cashflow / downAmt) * 100;
  const grm       = Math.round((price / rent) * 10) / 10;

  let verdict, vsub, cls;
  if (coc >= tgtCoc && capRate >= 7) {
    verdict = 'Strong Rental'; cls = 'hot';
    vsub = 'Solid cash-on-cash and cap rate. This is a legitimate vacation rental play.';
  } else if (coc >= tgtCoc * 0.7 && capRate >= 5) {
    verdict = 'Dig Deeper'; cls = 'warm';
    vsub = 'Decent returns but verify occupancy projections locally before committing.';
  } else {
    verdict = 'Thin Margins'; cls = 'pass';
    vsub = 'Cash flow is too tight at this price and occupancy. Negotiate down or find a better market.';
  }

  showResults(verdict, vsub, cls,
    [
      { label: 'Cash-on-Cash',   val: pct(coc),       cls: colorClass(coc, tgtCoc, tgtCoc * 0.7) },
      { label: 'Cap Rate',       val: pct(capRate),   cls: colorClass(capRate, 7, 5) },
      { label: 'Annual Cash Flow', val: fmt(cashflow), cls: colorClass(cashflow, 5000, 0) },
      { label: 'Gross Rent Mult', val: grm + 'x',     cls: colorClass(15 - grm, 8, 4) },
    ],
    [
      { label: 'Gross annual rent',                       val: fmt(rent) },
      { label: `Effective rent (${Math.round(occ*100)}% occ.)`, val: fmt(effRent) },
      { label: 'Management fees',                         val: '–' + fmt(mgmtCost) },
      { label: 'Taxes + insurance',                       val: '–' + fmt(tax) },
      { label: 'Maintenance',                             val: '–' + fmt(maint) },
      { label: 'Net operating income',                    val: fmt(noi) },
      { label: 'Annual debt service (7%)',                val: '–' + fmt(debt) },
      { label: 'Net cash flow',                           val: fmt(cashflow), total: true, color: cashflow >= 0 ? '#b8ff57' : '#ff6b6b' },
    ]
  );
}
</script>
</body>
</html>
